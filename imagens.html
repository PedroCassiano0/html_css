<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML - Vinculando Imagens</title>
</head>
<body style="background-color: rgba(100, 145, 40, 0.7);">
    <h1>HTML Vinculando Imagem</h1>
    <br>
    <h2>Foto do Carro 1</h2>
    <img src="imagem/carro1" alt="Foto de um carro">
    <br>
    <h2>Foto do Carro 2 </h2>
    <img src="imagem/carro2" alt="Foto de um carro">
    <br>
    <h2>Site da Uniube</h2>
    <img src="https://uniube.com.br" alt="Site da Uniube">
    <br>
    <h2>Gif animado</h2>
    <img src="imagem/gifanimado" alt="Gif animado aleatorio">
    <br>
    <h2>Imagem PNG Transparente</h2>
    <img src="imagem/imagempng" alt="Imagem PNG">
</body>
</html>
