<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens - Santos FC</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
            color: #1a1a1a;
        }

        header {
            background-color: #1a1a1a;
            color: white;
            padding: 20px 30px;
            border-bottom: 4px solid #888;
        }

        header h1 {
            margin: 0 0 6px 0;
            font-size: 30px;
        }

        header p {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #ccc;
        }

        .logo-uniube {
            background-color: white;
            padding:6px 10px;
            border-radius: 4px;
        }

        nav {
            background-color: #333;
            padding: 10px 30px;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-size: 15px;
            padding: 12px 12px;
            border-radius: 15px;
        }

        nav a:hover {
            background-color: #555;
        }

        nav a.ativo {
            background-color: #555;
        }

        main {
            max-width: 900px;
            margin: 30px auto;
            padding: 15px;
        }

        main h2 {
            font-size: 22px;
            border-bottom: 3px solid #1a1a1a;
            padding-bottom: 8px;
            margin-bottom: 24px;
        }

        .galeria {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 30px;
        }

        .galeria h3 {
            font-size: 17px;
            margin: 0 0 16px 0;
            color: #1a1a1a;
        }

        .grade-imagens {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .imagem {
            text-align: center;
        }

        .grade-imagens img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #ccc;
            display: block;
            margin: 0 auto 6px auto;
        }

        .grade-imagens figcaption {
            font-size: 13px;
            color: #555;
            margin: 0;
        }

        footer {
            background-color: #1a1a1a;
            color: #aaa;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
            font-size: 13px;
        }        
    </style>
</head>
<body>

    <header>
        <h1>Santos Futebol Clube</h1>
        <p>RA: 1238122 - Pedro Henrique França Cassiano</p>
        <a href="https://www.uniube.br" target="_blank" title="Site da Uniube">
            <img class="logo-uniube" src="https://uniube.br/img/landing/logo_azul.svg" width="120" alt="Logo Uniube">
        </a>
    </header>

    <nav>
        <a href="index.html">Início</a>
        <a href="imagens.html" class="ativo">Imagens</a>
        <a href="links.html">Links</a>
        <a href="fale_conosco.html">Fale Conosco</a>
    </nav>

    <main>
        <h2>Galeria de Imagens</h2>

        <div class="galeria">
            <h3>Estádio e Clube</h3>

            <div class="grade-imagens">
                <figure class="imagem">
                    <img src="imagens/vila_belmiro.jpg" alt="Estádio Vila Belmiro">
                    <figcaption>Estádio Vila Belmiro</figcaption>
                </figure>

                <figure class="imagem">    
                    <img src="imagens/escudo_santos.png" alt="Escudo do Santos FC">
                    <figcaption>Escudo oficial do Santos FC</figcaption>
                </figure>    

                <figure class="imagem">    
                    <img src="imagens/uniforme_santos.jpg" alt="Uniforme do Santos FC">
                    <figcaption>Uniforme oficial do Santos FC - Temporada 2026</figcaption>
                </figure>
            </div> 
        </div>

        <div class="galeria">
            <h3>Ídolos e Momentos Históricos</h3>

            <div class="grade-imagens">
                <figure class="imagem">
                    <img src="imagens/pele.jpg" alt="Pelé - O Rei do Futebol">
                    <figcaption>Pelé - O Rei do Futebol</figcaption>
                </figure>

                <figure class="imagem">
                    <img src="imagens/mundial_1962.jpg" alt="Mundial de Clubes 1962">
                    <figcaption>Mundial de Clubes 1962</figcaption>
                </figure>

                <figure class="imagem">
                    <img src="imagens/libertadores.jpg" alt="Conmebol Libertadores">
                    <figcaption>Conquista da Libertadores 2011</figcaption>
                </figure>

                <figure class="imagem">
                    <img src="imagens/neymar.jpg" alt="Neymar no Santos FC">
                    <figcaption>Neymar - Revelação Santista</figcaption>
                </figure>

                <figure class="imagem">
                    <img src="imagens/torcida.jpg" alt="Torcida do Santos FC">
                    <figcaption>Torcida do Santos na Vila</figcaption>
                </figure>

                <figure class="imagem">
                    <img src="imagens/copa_brasil_2010.jpg" alt="Copa do Brasil 2010">
                    <figcaption>Copa do Brasil 2010</figcaption>
                </figure>
            </div>
        </div>

    </main>

    <footer>
        <p>&copy; 2026 Santos FC Fan Site - Projeto Acadêmico - Pedro Henrique França Cassiano - RA: 1238122</p>
     </footer>

</body>
</html>
